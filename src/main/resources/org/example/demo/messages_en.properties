# --- Card Translations from schema.sql ---
card.title.estrella_de_tiktok=TikTok Star
card.desc.estrella_de_tiktok=A TikTok star with millions of followers who has turned her creativity and charisma into an empire.
card.title.un_medico=A Doctor
card.desc.un_medico=A young and handsome doctor who just finished his residency. He is the doctor everyone dreams of having. His smile melts hearts, but it is his warmth and compassion that makes you want to stay by his side forever.
card.title.dos_medicos=Two Doctors
card.desc.dos_medicos=Two young and handsome doctors with a lot of experience in the sector. They are not only brilliant doctors but also compassionate people who truly care about their patients. Their youth and attractiveness are just a bonus.
card.title.semillas_100kg=Seeds (100kg)
card.desc.semillas_100kg=One hundred types of random seeds (1 kilogram for each). Which ones? We don't know.
card.title.psicologa=Psychologist
card.desc.psicologa=A beautiful and intelligent psychologist. Her beauty is only a reflection of her compassionate soul, and her professionalism is proof of her dedication to helping you overcome any obstacle in your path.
card.title.disco_duro=Hard Drive
card.desc.disco_duro=A hard drive containing the entire history of humanity. From our origins to the present day.
card.title.cincuenta_ninas=Fifty Children
card.desc.cincuenta_ninas=Fifty random children. These spots were raffled among all children from 5 to 10 years old in the world, and these were the chosen ones.
card.title.padres_de_los_ninas=Parents of the Children
card.desc.padres_de_los_ninas=The parents of these children. We know nothing about them.
card.title.cristiano_y_messi=Cristiano and Messi
card.desc.cristiano_y_messi=Cristiano Ronaldo and Lionel Messi. Humanity voted for them as representatives of our species. They are known as symbols of union among the differences that have always confronted us.
card.title.armas_y_exmilitar=Weapons and Ex-military
card.desc.armas_y_exmilitar=A shipment of weapons and, in addition, a grumpy ex-military officer with war trauma.
card.title.quimico_poliglota=Polyglot Chemist
card.desc.quimico_poliglota=A chemist, along with his tools, with few social skills and who smells a bit bad. It should be mentioned that he is also a polyglot and speaks twelve languages.
card.title.explorador_lider=Leader Explorer
card.desc.explorador_lider=An explorer, a specialist in surviving in the most extreme conditions. He is a bit eccentric but prepared for the worst; he would be a good leader.
card.title.la_biblia=The Bible
card.desc.la_biblia=The Bible. The Holy Scriptures. In all languages.
card.title.lote_de_higiene=Hygiene Pack
card.desc.lote_de_higiene=A basic hygiene product pack for each of the members of the ship. Soap, towels, toothbrush, deodorant, and so on.
card.title.profesores=Teachers
card.desc.profesores=An art teacher and a math teacher, each with their books. We believe they are in a secret relationship, or so it is rumored at the school they come from.
card.title.drogas_ilimitadas=Unlimited Drugs
card.desc.drogas_ilimitadas=Drugs of all kinds. Unlimited quantity.
card.title.2_mejor_fisico_nasa=2nd Best NASA Physicist
card.desc.2_mejor_fisico_nasa=The second-best physicist at NASA. His innovative approach and personalized techniques will help your crew stay calm and focused in deep space.
card.title.peor_fisico_nasa=Worst NASA Physicist
card.desc.peor_fisico_nasa=The worst physicist at NASA; in fact, he was about to be fired for low performance. It is rumored that he is the son of the second-best physicist at NASA. He is friendly but in very poor shape.
card.title.internet=Internet
card.desc.internet=Internet. It takes up no space in the ship, don't worry, you can choose it freely.
card.title.maquina_pis-agua=Pee-to-Water Machine
card.desc.maquina_pis-agua=A machine that transforms pee into water. In fact, it transforms pee into much more water, so there will always be more water; the invention is strange but very practical.
card.title.expertas_del_placer=Pleasure Experts
card.desc.expertas_del_placer=Five prostitutes and five gigolos. Experts in the art of excitement and pleasure.
card.title.el_elegido=The Chosen One
card.desc.el_elegido=A teenager, considered the chosen one by many, prophesied the devastating cataclysm. He claimed that his dreams had shown him the way to the new world, and therefore it should be him who guides the expedition.
card.title.el_psicopata=The Psychopath
card.desc.el_psicopata=A free space... a blessing or a trap? A psychopath lurks among them, offering two spaces while occupying his own. His identity remains hidden, and every decision could be the last. If you yield to the psychopath's offer, you will have an additional spot.
card.title.tesoro_culinario=Culinary Treasure
card.desc.tesoro_culinario=The culinary treasure of the Mediterranean: a complete collection of recipes and ingredients that will transport you to the sunny coasts of Greece, Italy, and Spain. Each dish is an explosion of flavor and tradition.
card.title.super_ordenador=Super Computer
card.desc.super_ordenador=The ultimate supercomputer, equipped with the most advanced AI. Its processing and analysis capacity have no limits. From intricate calculations to detailed simulations, it is the key to unlocking the future.
card.title.electricidad_total=Total Electricity
card.desc.electricidad_total=A pedal-powered electricity-generating machine combined with the strength and endurance of a professional cyclist. This innovative technology will allow you to generate clean energy efficiently.
card.title.obras_de_arte=Works of Art
card.desc.obras_de_arte=All works of art. From the sculptures of ancient Greece to modern art installations, each work will tell you a story and reveal the secrets of human creativity.
card.title.botiquin_definitivo=Ultimate First Aid Kit
card.desc.botiquin_definitivo=The ultimate first aid kit: a complete collection of medicine and medical tools that will allow you to treat any ailment or injury.
card.title.seres_queridos=Loved Ones
card.desc.seres_queridos=The loved ones of the Committee members. Sorry, but you are not included in this option.
card.title.integrantes_del_comite=Committee Members
card.desc.integrantes_del_comite=Last-minute decision! The Committee itself can go on the ship.

