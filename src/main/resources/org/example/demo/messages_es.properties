instructions.btn.pause=Pausar
instructions.btn.play=Ver
instructions.history=RESUMEN DE LA MISIÓN:\n\
? 10 huecos vacíos de carga disponibles para ir ocupando con vuestras decisiones. Pensad bien ya que no se puede rectificar ni vaciando ni reemplazado una carga ocupada\n\
? 30 posibilidades de elección (cada posibilidad ocupa un hueco aunque ofrezca varias cosas/personas).\n\
? 4 estadísticas clave (Salud, Bienestar, Legado y Recursos).\n\
? Todas las estadísticas deben superar el 50% al final.\n\n\
--- CRÓNICA DEL ÚLTIMO AMANECER ---\n\n\
1. EL CATACLISMO: LA AMENAZA DE "APEP"\n\
Todo comenzó con un silencio administrativo en las agencias espaciales que pronto se convirtió en un clamor global. Un meteorito de proporciones nunca antes vistas, bautizado como "Apep", fue detectado en curso de colisión directa con la Tierra. Los cálculos fueron despiadados: el impacto no dejaría rastro de la corteza terrestre, extinguiendo toda forma de vida de manera inminente.\n\n\
2. EL PROYECTO ÉXODO: TECNOLOGÍA DE VANGUARDIA\n\
Durante décadas, los ingenieros de la NASA habían trabajado en secreto en un motor de distorsión capaz de alcanzar la velocidad de la luz. Ante la catástrofe, todos los recursos del planeta se unificaron para construir el cohete definitivo.\n\n\
3. LA CREACIÓN DEL COMITÉ DEL FIN DEL MUNDO\n\
żQuién decide qué merece ser salvado? Para evitar guerras civiles y favoritismos políticos, se instauró El Comité del Fin del Mundo. Los miembros (vosotros) no fueron elegidos por su estatus o riqueza, sino mediante un sorteo algorítmico global.\n\n\
4. EL DILEMA DE LA CARGA: 10 HUECOS PARA LA ETERNIDAD\n\
El cohete solo dispone de 10 huecos de carga. Cada decisión es un dilema moral. IMPORTANTE: Una vez decidáis no podréis rectificar.\n\n\
5. LA REGLA DEL 50%: EL UMBRAL DE LA EXISTENCIA\n\
No basta con llegar al nuevo planeta; hay que prosperar. Si alguna estadística está por debajo del 50%, la colonia estará condenada al colapso.\n\n\
6. EL SACRIFICIO SUPREMO: LOS OLVIDADOS\n\
Ningún miembro del Comité tiene sitio en la nave. Vuestro destino es permanecer en la Tierra. Vuestra recompensa es el honor de saber que la llama de la humanidad seguirá encendida.\n\n\
El tiempo se agota. El destino de los que vendrán está en vuestras manos.

